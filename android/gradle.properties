org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Réseau — timeout étendu pour connexions lentes
systemProp.org.gradle.internal.http.socketTimeout=300000
systemProp.org.gradle.internal.http.connectionTimeout=300000
# Daemon — réutilisation pour éviter les redémarrages
org.gradle.daemon=true
org.gradle.parallel=true
