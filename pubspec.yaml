name: casaimo
description: CasaImo - Plateforme de logement immobilier
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4
  firebase_crashlytics: ^4.0.4

  # UI & Design
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^5.0.0
  photo_view: ^0.15.0
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2

  # Maps
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Forms
  reactive_forms: ^17.0.1

  # Local Storage
  shared_preferences: ^2.2.3

  # Image handling
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Auth
  google_sign_in: ^6.2.1

  # Date & Time
  table_calendar: ^3.1.2
  intl: ^0.20.2

  # Utils
  equatable: ^2.0.5
  uuid: ^4.4.2
  logger: ^2.4.0
  url_launcher: ^6.3.0
  flutter_animate: ^4.5.0
  video_player: ^2.9.2
  gap: ^3.0.1
  share_plus: ^10.0.0

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/images/logo1.png
    background_color: "#1B5E20"
    theme_color: "#2E7D32"
  image_path: assets/images/logo1.png
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: assets/images/logo1.png

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
